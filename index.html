<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f8f4ea" />
  <title>90 Days Life Program</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Appu's personal operating system</p>
        <h1>90 Days Life Program</h1>
        <p class="date" id="dateLine">Today</p>
      </div>
      <div class="day-pill"><span id="dayNumber">1</span><small>/90</small></div>
    </header>

    <section class="anchor-card">
      <p>Today's anchor</p>
      <h2 id="affirmation">Health is the Main Quest. Everything else is a side quest.</h2>
    </section>

    <main id="screen"></main>
  </div>

  <nav class="bottom-nav" aria-label="Main navigation">
    <button data-tab="today" class="active">🏠<span>Today</span></button>
    <button data-tab="schedule">📅<span>Plan</span></button>
    <button data-tab="health">❤️<span>Health</span></button>
    <button data-tab="journal">✍️<span>Journal</span></button>
    <button data-tab="review">📈<span>Review</span></button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
