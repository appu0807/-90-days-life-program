<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f8f4e8" />
  <title>90 Days Life Program</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Appu's Personal Operating System</p>
        <h1>90 Days Life Program</h1>
        <p id="todayDate" class="muted"></p>
      </div>
      <div class="day-ring" aria-label="90 day progress">
        <strong id="dayNumber">1</strong><span>/90</span>
      </div>
    </header>

    <main id="view" class="view"></main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-btn active" data-view="today">Today</button>
      <button class="nav-btn" data-view="habits">Habits</button>
      <button class="nav-btn" data-view="log">Log</button>
      <button class="nav-btn" data-view="health">Health</button>
      <button class="nav-btn" data-view="plan">Plan</button>
      <button class="nav-btn" data-view="report">Report</button>
    </nav>
  </div>
  <script src="script.js"></script>
</body>
</html>
